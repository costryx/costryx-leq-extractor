name: Refresh SHA-256 manifest

on:
  push:
    branches: [main]
    paths:
      - 'docs/api-viewer/openapi-leq-gci-mhl-v1.2.0*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute SHA-256 + render manifest
        working-directory: docs/api-viewer
        run: |
          set -euo pipefail

          # 1. raw sha256 file (one hash per file, full hash)
          sha256sum \
            openapi-leq-gci-mhl-v1.2.0.yaml \
            openapi-leq-gci-mhl-v1.2.0-resolved.yaml \
            openapi-leq-gci-mhl-v1.2.0.json \
            openapi-leq-gci-mhl-v1.2.0-resolved.json \
            > openapi-v1.2.0.sha256

          # 2. human-readable manifest (NIST FIPS 180-4 style, sovereign-controlled)
          GEN_TS=$(TZ=Asia/Taipei date +%Y-%m-%dT%H:%M:%S%z)

          file_line () {
            local f="$1"
            local h
            h=$(sha256sum "$f" | awk '{print substr($1,1,16)"..."}')
            local sz
            sz=$(du -k "$f" | awk '{printf "%.1f KB", $1}')
            printf "%-22s %9s  %s\n" "$h" "$sz" "$f"
          }

          {
            echo "========================================================================"
            echo "Leq / GCI / MHL Enterprise API Specification v1.2.0"
            echo "Cryptographic Manifest (SHA-256, NIST FIPS PUB 180-4)"
            echo "========================================================================"
            echo "Author:        Chin-Yu Hsu (Independent Researcher)"
            echo "ORCID:         0009-0009-6267-7897"
            echo "Generated at:  ${GEN_TS} (CST)"
            echo "Commit SHA:    ${GITHUB_SHA}"
            echo "Workflow run:  ${GITHUB_WORKFLOW} #${GITHUB_RUN_NUMBER}"
            echo "Standard:      OpenAPI 3.1 + JSON Schema 2020-12"
            echo "Verification:  Auto-generated by GitHub Actions, repo-pinned"
            echo "------------------------------------------------------------------------"
            file_line openapi-leq-gci-mhl-v1.2.0.yaml
            file_line openapi-leq-gci-mhl-v1.2.0-resolved.yaml
            file_line openapi-leq-gci-mhl-v1.2.0.json
            file_line openapi-leq-gci-mhl-v1.2.0-resolved.json
            echo "========================================================================"
            echo "Companion artifacts:"
            echo "  - V4.0.1 working report: 10.5281/zenodo.20382496"
            echo "  - V2.4 foundation:       10.5281/zenodo.20341571"
            echo "  - v0.1.0 software:       10.5281/zenodo.20384916"
            echo "  - GitHub repo:           https://github.com/costryx/costryx-leq-extractor"
            echo "  - Live API viewer:       https://costryx.github.io/costryx-leq-extractor/api-viewer/"
            echo "  - Contact:               chinyu@costryx.net"
            echo "========================================================================"
          } > openapi-v1.2.0.MANIFEST.txt

      - name: Show generated files (for run log audit)
        working-directory: docs/api-viewer
        run: |
          echo "=== openapi-v1.2.0.sha256 ==="
          cat openapi-v1.2.0.sha256
          echo
          echo "=== openapi-v1.2.0.MANIFEST.txt ==="
          cat openapi-v1.2.0.MANIFEST.txt

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(manifest): refresh SHA-256 manifest for v1.2.0 specs"
          file_pattern: 'docs/api-viewer/openapi-v1.2.0.sha256 docs/api-viewer/openapi-v1.2.0.MANIFEST.txt'
