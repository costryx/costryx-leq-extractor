name: Refresh SHA-256 manifest

on:
  push:
    branches: [main]
    paths:
      - 'docs/api-viewer/openapi-leq-gci-mhl-v1.2.0*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute SHA-256
        working-directory: docs/api-viewer
        run: |
          sha256sum \
            openapi-leq-gci-mhl-v1.2.0.yaml \
            openapi-leq-gci-mhl-v1.2.0.json \
            openapi-leq-gci-mhl-v1.2.0-resolved.yaml \
            openapi-leq-gci-mhl-v1.2.0-resolved.json \
            > openapi-v1.2.0.sha256

          {
            echo "Leq / GCI / MHL Enterprise API v1.2.0 — SHA-256 manifest"
            echo "Generated:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit:     ${GITHUB_SHA}"
            echo "Workflow:   ${GITHUB_WORKFLOW} (run #${GITHUB_RUN_NUMBER})"
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo
            echo "Files (sha256 + filename):"
            cat openapi-v1.2.0.sha256
          } > openapi-v1.2.0.MANIFEST.txt

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(manifest): refresh SHA-256 for v1.2.0 specs"
          file_pattern: |
            docs/api-viewer/openapi-v1.2.0.sha256
            docs/api-viewer/openapi-v1.2.0.MANIFEST.txt
